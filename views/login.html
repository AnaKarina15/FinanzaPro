<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>FinanzaPro - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-login">
    <main class="login-container">
        <article class="card login-card">
            <header class="logo-container-login">
                <div class="logo-icon"><span class="material-symbols-outlined">payments</span></div>
                <h1>FinanzaPro</h1>
            </header>
            
            <h2 class="login-title">Bienvenido de nuevo</h2>
            <p class="login-subtitle">Ingresa tus datos para continuar</p>

            <form action="dashboard.html" method="GET" class="formulario login-form">
                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="usuario@finanzapro.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="login-actions">
                    <label class="checkbox-container">
                        <input type="checkbox"> Recordarme
                    </label>
                    <a href="#" class="link-primario">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primario w-full">Iniciar Sesión</button>
            </form>
            
            <footer class="login-footer">
                <p>¿No tienes cuenta? <a href="#" class="link-primario">Regístrate</a></p>
            </footer>
        </article>
    </main>

    <script src="../js/script.js"></script>
</body>
</html>
